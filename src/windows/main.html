<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Screenshot Monitor</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <!-- Setup View -->
  <div id="setup-view">
    <h1>Screenshot Monitor <span class="version">v1.0.4</span></h1>

    <div class="btn-row">
      <button id="btn-select" onclick="selectRegion()">キャプチャ領域を選択</button>
      <button id="btn-start" onclick="startMonitoring()" disabled>監視スタート</button>
      <button id="btn-load" onclick="loadFolder()">既存フォルダを参照</button>
    </div>

    <fieldset class="settings">
      <legend>設定</legend>
      <div class="setting-row">
        <label>チェック間隔:</label>
        <input type="number" id="interval" value="1" min="1" max="60" step="1">
        <span class="unit">秒</span>
        <span class="hint">画面変化を確認する頻度</span>
      </div>
      <div class="setting-row">
        <label>変化の割合:</label>
        <input type="number" id="threshold" value="10" min="1" max="100" step="1">
        <span class="unit">%</span>
        <span class="hint">領域の何%が変わったら撮影（大=大きな変化のみ）</span>
      </div>
      <div class="setting-row">
        <label>色の感度:</label>
        <input type="number" id="pixel-threshold" value="30" min="1" max="255" step="1">
        <span class="unit"></span>
        <span class="hint">1ピクセルの色差がこの値以上で変化とみなす(0-255)</span>
      </div>
    </fieldset>

    <div id="status">キャプチャ領域を選択してください</div>
  </div>

  <!-- Results View -->
  <div id="results-view" style="display:none">
    <div class="top-bar" id="normal-toolbar">
      <button onclick="newSession()">新規録画</button>
      <button onclick="loadFolder()">既存フォルダを参照</button>
      <span class="separator"></span>
      <button onclick="exportPdf()">PDFに書き出す</button>
      <button onclick="enterTrimMode()">トリミング</button>
      <div class="spacer"></div>
      <button onclick="selectAll()">全て選択</button>
      <button onclick="deselectAll()">全て解除</button>
    </div>

    <div id="trim-toolbar" style="display:none">
      <div class="trim-toolbar-top">
        <button onclick="exitTrimMode()">&#8592; 戻る</button>
        <span class="separator"></span>
        <div id="trim-step-guide" class="trim-step-guide">
          <span class="trim-step" id="trim-step-1"><span class="step-num">1</span> 開始画像をクリック</span>
          <span class="trim-step-arrow">&#9654;</span>
          <span class="trim-step" id="trim-step-2"><span class="step-num">2</span> 終了画像をクリック</span>
          <span class="trim-step-arrow">&#9654;</span>
          <span class="trim-step" id="trim-step-3"><span class="step-num">3</span> トリミング範囲を指定</span>
        </div>
        <span id="trim-instruction" class="trim-instruction"></span>
        <div class="spacer"></div>
        <button class="btn-apply-trim" onclick="applyAllTrims()" id="btn-apply-trim" disabled>
          &#9986; トリミングを実行
        </button>
      </div>
      <div id="trim-group-list"></div>
    </div>

    <div class="status-bar">
      <span id="count-label"></span>
      <span id="source-label"></span>
    </div>

    <div id="grid-container">
      <div id="thumbnail-grid"></div>
      <div id="drag-select-box"></div>
    </div>
  </div>

  <!-- Crop Editor Modal -->
  <div id="crop-editor" style="display:none">
    <div class="crop-editor-backdrop" onclick="cancelCropEditor()"></div>
    <div class="crop-editor-panel">
      <div class="crop-editor-header">
        <span id="crop-range-info"></span>
        <span id="crop-dimensions"></span>
      </div>
      <div class="crop-editor-body">
        <button class="crop-nav-btn crop-nav-prev" id="crop-prev" onclick="cropPrev()">&#9664;</button>
        <div id="crop-canvas-wrapper">
          <img id="crop-img" src="">
          <div id="crop-selection" style="display:none">
            <div class="crop-handle" data-handle="tl"></div>
            <div class="crop-handle" data-handle="tr"></div>
            <div class="crop-handle" data-handle="bl"></div>
            <div class="crop-handle" data-handle="br"></div>
          </div>
        </div>
        <button class="crop-nav-btn crop-nav-next" id="crop-next" onclick="cropNext()">&#9654;</button>
      </div>
      <div class="crop-editor-nav-info">
        <span id="crop-nav-counter"></span>
        <span id="crop-nav-timestamp"></span>
        <button class="crop-sel-toggle" id="crop-sel-toggle" onclick="cropToggleSelection()"></button>
      </div>
      <div class="crop-editor-footer">
        <span class="crop-hint">画像上でドラッグしてトリミング範囲を描画 / &#9664;&#9654;で他の画像を確認</span>
        <button onclick="cancelCropEditor()">キャンセル</button>
        <button class="btn-primary" onclick="confirmCropEditor()">確定</button>
      </div>
    </div>
  </div>

  <!-- Lightbox viewer -->
  <div id="lightbox" style="display:none">
    <div id="lb-backdrop"></div>
    <button id="lb-close" onclick="closeLightbox()">&times;</button>
    <button id="lb-prev" onclick="lbPrev()">&#9664;</button>
    <button id="lb-next" onclick="lbNext()">&#9654;</button>
    <div id="lb-check" class="lb-check selected" onclick="lbToggleSelection()">
      <svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="7" x2="6" y2="10"/><line x1="6" y1="10" x2="11" y2="4"/></svg>
    </div>
    <img id="lb-img" src="">
    <div id="lb-footer">
      <span id="lb-counter"></span>
      <span id="lb-timestamp"></span>
      <button id="lb-toggle-sel" onclick="lbToggleSelection()">選択解除</button>
    </div>
  </div>

  <script src="main-renderer.js"></script>
</body>
</html>
